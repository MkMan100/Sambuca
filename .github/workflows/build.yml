name: Build Sambuca Plugin (Windows)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4
      with:
        submodules: true # Utile se hai JUCE come sottomodulo git

    - name: Configura MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Configura CMake
      uses: lukka/get-cmake@latest

    - name: Ripristina o Installa le dipendenze di sistema (se necessarie)
      shell: powershell
      run: |
        # GitHub Windows Runners hanno già installato Visual Studio e gli SDK necessari

    - name: Configura il progetto con CMake
      shell: bash
      run: |
        cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

    - name: Compila il VST3 e l'EXE Standalone
      shell: bash
      run: |
        cmake --build build --config Release --parallel 4

    - name: Raccogli gli Artefatti Compilati e Asset Esterne
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path .\artifacts
        Get-ChildItem -Path .\build -Filter "*.vst3" -Recurse | Copy-Item -Destination .\artifacts -Recurse
        Get-ChildItem -Path .\build -Filter "*.exe" -Recurse | Copy-Item -Destination .\artifacts
        
        # Percorso aggiornato con la doppia cartella Sambuca
        Copy-Item -Path .\Sambuca\Source\Assets -Destination .\artifacts\Assets -Recurse
        
        # Cerca e copia il VST3 e l'EXE appena creati
        Get-ChildItem -Path .\build -Filter "*.vst3" -Recurse | Copy-Item -Destination .\artifacts -Recurse
        Get-ChildItem -Path .\build -Filter "*.exe" -Recurse | Copy-Item -Destination .\artifacts

        # Copia la cartella delle immagini rinominandola in "Assets" e mettendola accanto ai file
        Copy-Item -Path .\Source\Assets -Destination .\artifacts\Assets -Recurse
    - name: Carica VST3 e Standalone su GitHub
      uses: actions/upload-artifact@v4  # <-- Corretto qui!
      with:
        name: Sambuca-Windows-Build
        path: ./artifacts/
