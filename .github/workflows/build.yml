name: Build Sambuca Plugin (Windows)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4
      with:
        submodules: true # Utile se hai JUCE come sottomodulo git

    - name: Configura MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Configura CMake
      uses: lukka/get-cmake@latest

    - name: Ripristina o Installa le dipendenze di sistema (se necessarie)
      shell: powershell
      run: |
        # GitHub Windows Runners hanno già installato Visual Studio e gli SDK necessari

    - name: Configura il progetto con CMake
      shell: bash
      run: |
        cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

    - name: Compila il VST3 e l'EXE Standalone
      shell: bash
      run: |
        cmake --build build --config Release --parallel 4

    - name: Raccogli gli Artefatti Compilati e Asset Esterne
      shell: powershell
      run: |
        # Crea la cartella degli artefatti pulita
        New-Item -ItemType Directory -Force -Path .\artifacts

        # Copia il bundle VST3 (gestendo correttamente le cartelle)
        Get-ChildItem -Path .\build -Filter "*.vst3" -Recurse | ForEach-Object {
            $dest = Join-Path ".\artifacts" $_.Name
            Copy-Item -Path $_.FullName -Destination $dest -Recurse -Force
        }

        # Copia l'eseguibile Standalone (.exe)
        Get-ChildItem -Path .\build -Filter "*.exe" -Recurse | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination .\artifacts -Force
        }
        
        # Copia la cartella degli Asset grafici
        if (Test-Path .\Sambuca\Source\Assets) {
            Copy-Item -Path .\Sambuca\Source\Assets -Destination .\artifacts\Assets -Recurse -Force
        }
    - name: Carica VST3 e Standalone su GitHub
      uses: actions/upload-artifact@v4  # <-- Corretto qui!
      with:
        name: Sambuca-Windows-Build
        path: ./artifacts/
